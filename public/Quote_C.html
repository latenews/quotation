<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote 등록</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1A1A2E; color: #E8B86D; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  header h1 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
  header span { font-size: 0.8rem; color: #888; }
  .container { max-width: 860px; margin: 40px auto; padding: 0 20px; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #1A1A2E; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .back-btn:hover { color: #E8B86D; }
  .nav-btn { display: inline-flex; align-items: center; gap: 6px; background: #1A1A2E; color: #E8B86D; padding: 8px 18px; border-radius: 5px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .nav-btn:hover { background: #2a2a4e; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 36px 40px; }
  .card-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1A1A2E; border-bottom: 2px solid #E8B86D; padding-bottom: 10px; margin-bottom: 28px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #666; }
  .form-group input { border: 1.5px solid #ddd; border-radius: 5px; padding: 10px 12px; font-size: 0.88rem; outline: none; transition: border-color .2s; font-family: inherit; }
  .form-group input:focus { border-color: #1A1A2E; }
  .form-group input.required { border-left: 3px solid #E8B86D; }
  .form-group input.auto-num { background: #f0f0f0; font-weight: 700; color: #1A1A2E; letter-spacing: 1px; cursor: not-allowed; }
  .btn-row { display: flex; gap: 10px; margin-top: 28px; }
  .btn { padding: 11px 32px; border: none; border-radius: 5px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all .2s; letter-spacing: .5px; }
  .btn-primary { background: #1A1A2E; color: #E8B86D; }
  .btn-primary:hover { background: #2a2a4e; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .btn-primary:disabled { background: #ccc; color: #999; cursor: not-allowed; transform: none; box-shadow: none; }
  .alert { padding: 12px 16px; border-radius: 5px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
  .alert.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
  .alert.error   { background: #fdecea; color: #c62828; border-left: 4px solid #f44336; }
  .alert.show    { display: block; }
</style>
</head>
<body>
<header>
  <h1>📋 Quotation Manager</h1>
  <span>Quote → Create</span>
</header>
<div class="container">
  <div class="top-nav">
    <a class="back-btn" href="/">← 메인으로 돌아가기</a>
    <a class="nav-btn" href="Receive_C.html">🏢 수신자 등록</a>
  </div>

  <div class="card">
    <div class="card-title">➕ 새 견적 등록</div>
    <div id="alert" class="alert"></div>
    <form id="quoteForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Quotation Numbers</label>
          <input type="text" id="Numbers" class="auto-num" readonly>
        </div>
        <div class="form-group">
          <label>Reference</label>
          <input type="text" id="Reference">
        </div>
        <div class="form-group">
          <label>Sales Rep</label>
          <input type="text" id="Sales_Rep">
        </div>
        <div class="form-group">
          <label>Date <span style="color:#E8B86D">*</span></label>
          <input type="date" id="Date" class="required" required>
        </div>
        <div class="form-group">
          <label>Due Date <span style="color:#E8B86D">*</span></label>
          <input type="date" id="Due_date" class="required" required>
        </div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary" id="saveBtn">💾 저장</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API = '/api/quotes';

  function getDateStr(offsetDays=0) {
    const d = new Date(); d.setDate(d.getDate()+offsetDays);
    return d.toISOString().substring(0,10);
  }

  // 다음 번호 로드
  async function loadNextNumber() {
    try {
      const json = await (await fetch('/api/quotes/next-number')).json();
      if (json.success) {
        document.getElementById('Numbers').value = json.nextNumber;
      }
    } catch(e) {
      // API 실패시 기본값
      const year = new Date().getFullYear();
      document.getElementById('Numbers').value = `Q-${year}-0001`;
    }
  }

  function showAlert(msg, type='success') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
    if (type === 'success') setTimeout(() => el.className = 'alert', 3000);
  }

  // 저장
  document.getElementById('quoteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById('saveBtn');
    const body = {
      Numbers  : document.getElementById('Numbers').value.trim(),
      Reference: document.getElementById('Reference').value.trim(),
      Date     : document.getElementById('Date').value,
      Due_date : document.getElementById('Due_date').value,
      Sales_Rep: document.getElementById('Sales_Rep').value.trim()
    };

    if (!body.Numbers) { showAlert('❌ 견적 번호를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.', 'error'); return; }
    if (!body.Date)    { showAlert('❌ Date를 입력해 주세요.', 'error'); return; }
    if (!body.Due_date){ showAlert('❌ Due Date를 입력해 주세요.', 'error'); return; }

    saveBtn.disabled = true;
    try {
      const json = await (await fetch(API, {
        method : 'POST',
        headers: {'Content-Type': 'application/json'},
        body   : JSON.stringify(body)
      })).json();

      if (json.success) {
        showAlert(`✅ ${body.Numbers} 등록 완료!`);
        // 필드 초기화 후 다음 번호 준비
        document.getElementById('Reference').value = '';
        document.getElementById('Sales_Rep').value = '';
        document.getElementById('Date').value      = getDateStr(0);
        document.getElementById('Due_date').value  = getDateStr(10);
        await loadNextNumber();
      } else {
        showAlert('❌ ' + json.message, 'error');
      }
    } catch(err) {
      showAlert('❌ 서버 오류: ' + err.message, 'error');
    } finally {
      saveBtn.disabled = false;
    }
  });

  // 초기 로드
  document.getElementById('Date').value     = getDateStr(0);
  document.getElementById('Due_date').value = getDateStr(10);
  loadNextNumber();
</script>
</body>
</html>
