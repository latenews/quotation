<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver 수정</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
  header { background: #1A1A2E; color: #E8B86D; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  header h1 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
  header span { font-size: 0.8rem; color: #888; }
  .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
  .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #1A1A2E; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .back-btn:hover { color: #E8B86D; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 28px 32px; margin-bottom: 28px; }
  .card-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1A1A2E; border-bottom: 2px solid #E8B86D; padding-bottom: 10px; margin-bottom: 22px; }
  .search-row { display: flex; gap: 12px; align-items: flex-end; }
  .search-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .search-group label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #666; }
  .search-group input { border: 1.5px solid #ddd; border-radius: 5px; padding: 10px 14px; font-size: 0.9rem; outline: none; transition: border-color .2s; font-family: inherit; }
  .search-group input:focus { border-color: #1A1A2E; }
  .btn { padding: 10px 24px; border: none; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #1A1A2E; color: #E8B86D; }
  .btn-primary:hover { background: #2a2a4e; }
  .btn-reset { background: #f0f0f0; color: #555; }
  .btn-reset:hover { background: #e0e0e0; }
  .btn-success { background: #2e7d32; color: #fff; }
  .btn-success:hover { background: #1b5e20; }
  .result-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .result-count { font-size: 0.82rem; color: #888; }
  .result-count strong { color: #1A1A2E; font-size: 1rem; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead tr { background: #1A1A2E; color: #fff; }
  thead th { padding: 12px 14px; text-align: left; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; cursor: pointer; }
  tbody tr:hover { background: #fffbf3; }
  tbody tr.selected { background: #FFF3DC !important; border-left: 3px solid #E8B86D; }
  tbody td { padding: 11px 14px; }
  .badge { display: inline-block; background: #1A1A2E; color: #E8B86D; font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 3px; }
  .empty-msg { text-align: center; padding: 40px; color: #aaa; font-size: 0.9rem; }
  .edit-card { display: none; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 28px 32px; margin-bottom: 28px; border-top: 3px solid #E8B86D; animation: fadeIn .2s ease; }
  .edit-card.show { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #666; }
  .form-group input { border: 1.5px solid #ddd; border-radius: 5px; padding: 9px 12px; font-size: 0.88rem; outline: none; transition: border-color .2s; font-family: inherit; }
  .form-group input:focus { border-color: #1A1A2E; }
  .form-group input.required { border-left: 3px solid #E8B86D; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .alert { padding: 11px 16px; border-radius: 5px; font-size: 0.85rem; margin-bottom: 18px; display: none; }
  .alert.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
  .alert.error   { background: #fdecea; color: #c62828; border-left: 4px solid #f44336; }
  .alert.show    { display: block; }
</style>
</head>
<body>
<header>
  <h1>📋 Quotation Manager</h1>
  <span>Receiver → 수정</span>
</header>
<div class="container">
  <div class="top-nav">
    <a class="back-btn" href="/">← 메인으로 돌아가기</a>
  </div>

  <!-- 검색 -->
  <div class="card">
    <div class="card-title">🔍 수신자 검색</div>
    <div class="search-row">
      <div class="search-group">
        <label>Company Name</label>
        <input type="text" id="searchInput" placeholder="회사명을 입력하세요"
               onkeydown="if(event.key==='Enter') search()">
      </div>
      <button class="btn btn-primary" onclick="search()">🔍 검색</button>
      <button class="btn btn-reset"   onclick="resetSearch()">전체 보기</button>
    </div>
  </div>

  <!-- 목록 -->
  <div class="card">
    <div class="result-summary">
      <div class="card-title" style="border:none;padding:0;margin:0;">
        🏢 수신자 목록
        <span style="font-size:0.75rem;color:#aaa;font-weight:400;">(행을 클릭하면 수정할 수 있습니다)</span>
      </div>
      <div class="result-count">총 <strong id="totalCount">0</strong> 건</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Company Name</th>
            <th>VAT No</th>
            <th>Address 1</th>
            <th>Address 2</th>
            <th>Postal Code</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty-msg">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 수정 폼 -->
  <div class="edit-card" id="editCard">
    <div class="card-title">✏️ 수신자 수정 — <span id="editTitle" style="color:#E8B86D;"></span></div>
    <div id="alert" class="alert"></div>
    <input type="hidden" id="edit_id">
    <div class="form-grid">
      <div class="form-group full">
        <label>Company Name <span style="color:#E8B86D">*</span></label>
        <input type="text" id="edit_company_name" class="required" required>
      </div>
      <div class="form-group">
        <label>VAT No</label>
        <input type="text" id="edit_vat_no">
      </div>
      <div class="form-group">
        <label>Postal Code</label>
        <input type="text" id="edit_postal_code">
      </div>
      <div class="form-group full">
        <label>Address 1</label>
        <input type="text" id="edit_address1">
      </div>
      <div class="form-group full">
        <label>Address 2</label>
        <input type="text" id="edit_address2">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="saveEdit()">💾 저장</button>
      <button class="btn btn-reset"   onclick="closeEdit()">✕ 취소</button>
    </div>
  </div>

</div>
<script>
  const API = '/api/receiver';

  function showAlert(msg, type='success') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
    setTimeout(() => el.className = 'alert', 3000);
  }

  async function search() {
    const keyword = document.getElementById('searchInput').value.trim();
    const tbody   = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">검색 중...</td></tr>';
    closeEdit();
    try {
      const url  = keyword ? `${API}/search?name=${encodeURIComponent(keyword)}` : API;
      const json = await (await fetch(url)).json();
      document.getElementById('totalCount').textContent = json.data?.length || 0;
      if (!json.success || !json.data.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">검색 결과가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = json.data.map(r => `
        <tr onclick="selectRow(this, ${r.receiver_id})" data-id="${r.receiver_id}">
          <td><span class="badge">${r.receiver_id}</span></td>
          <td><strong>${r.company_name}</strong></td>
          <td>${r.vat_no || '-'}</td>
          <td>${r.address1 || '-'}</td>
          <td>${r.address2 || '-'}</td>
          <td>${r.postal_code || '-'}</td>
        </tr>`).join('');
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-msg" style="color:#c62828">서버 오류: ${e.message}</td></tr>`;
    }
  }

  function resetSearch() {
    document.getElementById('searchInput').value = '';
    search();
  }

  async function selectRow(tr, id) {
    document.querySelectorAll('#tableBody tr').forEach(r => r.classList.remove('selected'));
    tr.classList.add('selected');
    try {
      const json = await (await fetch(`${API}/${id}`)).json();
      if (!json.success) return alert(json.message);
      const r = json.data;
      document.getElementById('edit_id').value           = r.receiver_id;
      document.getElementById('edit_company_name').value = r.company_name;
      document.getElementById('edit_vat_no').value       = r.vat_no || '';
      document.getElementById('edit_address1').value     = r.address1 || '';
      document.getElementById('edit_address2').value     = r.address2 || '';
      document.getElementById('edit_postal_code').value  = r.postal_code || '';
      document.getElementById('editTitle').textContent   = r.company_name;
      document.getElementById('editCard').classList.add('show');
      document.getElementById('editCard').scrollIntoView({ behavior:'smooth', block:'start' });
    } catch(e) { alert('오류: '+e.message); }
  }

  function closeEdit() {
    document.getElementById('editCard').classList.remove('show');
    document.querySelectorAll('#tableBody tr').forEach(r => r.classList.remove('selected'));
  }

  async function saveEdit() {
    const id   = document.getElementById('edit_id').value;
    const body = {
      company_name: document.getElementById('edit_company_name').value.trim(),
      vat_no      : document.getElementById('edit_vat_no').value.trim(),
      address1    : document.getElementById('edit_address1').value.trim(),
      address2    : document.getElementById('edit_address2').value.trim(),
      postal_code : document.getElementById('edit_postal_code').value.trim()
    };
    if (!body.company_name) { showAlert('❌ Company Name은 필수입니다.', 'error'); return; }
    try {
      const json = await (await fetch(`${API}/${id}`, {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
      })).json();
      if (json.success) { showAlert('✅ ' + body.company_name + ' 수정 완료!'); closeEdit(); search(); }
      else showAlert('❌ ' + json.message, 'error');
    } catch(e) { showAlert('❌ 서버 오류: '+e.message, 'error'); }
  }

  search();
</script>
<script>async function logout(){await fetch("/api/logout",{method:"POST"});window.location.href="/login.html";}</script>
</body>
</html>
